// 设备唯一标识（简单版一机一码）
function getDeviceId() {
    let id = localStorage.getItem("device_id");
    if (!id) {
        id = "DEV_" + Math.random().toString(36).substr(2) + Date.now();
        localStorage.setItem("device_id", id);
    }
    return id;
}

// 验证激活码
function checkActiveKey() {
    const key = document.getElementById("keyInput").value.trim();
    const err = document.getElementById("errMsg");
    if (!validKeys.includes(key)) {
        err.innerText = "激活码无效";
        return;
    }

    const now = Date.now();
    const device = getDeviceId();
    const storeKey = "test_auth_" + key;
    const data = JSON.parse(localStorage.getItem(storeKey) || "{}");

    // 一机一码：已绑定其他设备
    if (data.device && data.device !== device) {
        err.innerText = "该激活码已在其他设备使用";
        return;
    }

    // 过期判断
    if (data.activatedAt) {
        const expire = data.activatedAt + 24 * 60 * 60 * 1000;
        if (now > expire) {
            err.innerText = "激活码已过期（24小时）";
            return;
        }
    }

    // 首次激活：绑定设备+时间
    if (!data.activatedAt) {
        localStorage.setItem(storeKey, JSON.stringify({
            activatedAt: now,
            device: device,
            key: key
        }));
    }

    // 登录成功
    localStorage.setItem("current_key", key);
    enterTest();
}

// 进入测评
function enterTest() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainHeader").style.display = "block";
    document.getElementById("startPage").style.display = "block";
}

// 自动登录
window.onload = function () {
    const key = localStorage.getItem("current_key");
    if (!key) return;
    const data = JSON.parse(localStorage.getItem("test_auth_" + key) || "{}");
    const device = getDeviceId();
    if (data.device === device && data.activatedAt) {
        const expire = data.activatedAt + 24 * 60 * 60 * 1000;
        if (Date.now() < expire) {
            enterTest();
        }
    }
};

let current = 0;
let answers = Array(40).fill(0);
let score = {physical:0, cognitive:0, behavioral:0, emotional:0};

// ==============================================
// 三、测评逻辑
// ==============================================
function startTest() {
    current = 0;
    answers = Array(40).fill(0);
    score = {physical:0, cognitive:0, behavioral:0, emotional:0};
    document.getElementById("startPage").style.display = "none";
    document.getElementById("testPage").style.display = "block";
    render();
}

function render() {
    const q = questions[current];
    const box = document.getElementById("questionBox");
    const prog = document.getElementById("progress");
    prog.innerText = `第 ${current+1}/40 题`;

    let opts = "";
    [1,2,3,4,5].forEach(v => {
        const text = ["完全不符合","有点符合","一般符合","比较符合","完全符合"][v-1];
        const active = answers[current] === v ? "active" : "";
        opts += `<div class="option ${active}" onclick="select(${v})">${text}</div>`;
    });

    box.innerHTML = `
        <h3>${q.id}. ${q.text}</h3>
        <div class="options">${opts}</div>
    `;

    document.getElementById("prevBtn").disabled = current === 0;
    document.getElementById("nextBtn").style.display = current === 39 ? "none" : "block";
    document.getElementById("submitBtn").style.display = current === 39 ? "block" : "none";
}

function select(val) {
    answers[current] = val;
    render();
}

function prevQuestion() { current--; render(); }
function nextQuestion() {
    if (answers[current] === 0) { alert("请选择答案"); return; }
    current++; render();
}

function submitTest() {
    if (answers[current] === 0) { alert("请选择答案"); return; }
    calcScore();
    showResult();
}

function calcScore() {
    score = {physical:0, cognitive:0, behavioral:0, emotional:0};
    questions.forEach((q,i) => score[q.dim] += answers[i]);
}

// ==============================================

    document.getElementById("testPage").style.display = "none";
    document.getElementById("resultPage").style.display = "block";

    const total = score.physical + score.cognitive + score.behavioral + score.emotional;
    document.getElementById("totalScore").innerText = total;
    const [level,desc] = getTotalLevel(total);
    document.getElementById("scoreLevel").innerText = `${level} - ${desc}`;

    drawRadar();
    showBars();
    showCause();
    showSuggest();
}

function getDimLevel(s) {
    if (s <= 10) return ["无焦虑", "#4cd964"];
    if (s <= 20) return ["轻度焦虑", "#ffcc00"];
    if (s <= 30) return ["中度焦虑", "#ff9500"];
    if (s <= 40) return ["重度焦虑", "#ff3b30"];
    return ["极重度焦虑", "#c70000"];
}

function getTotalLevel(t) {
    if (t <= 50) return ["无焦虑","状态良好"];
    if (t <= 80) return ["轻度焦虑","可自我调节"];
    if (t <= 120) return ["中度焦虑","建议积极调整"];
    if (t <= 160) return ["重度焦虑","建议专业帮助"];
    return ["极重度焦虑","请尽快专业干预"];
}

function showBars() {
    const arr = [score.physical, score.cognitive, score.behavioral, score.emotional];
    arr.forEach((v,i) => {
        const w = Math.min(100, (v/50)*100);
        document.getElementById("bar"+(i+1)).style.width = w + "%";
        document.getElementById("num"+(i+1)).innerText = v;
        document.getElementById("tag"+(i+1)).innerText = getDimLevel(v)[0];
    });
}

// ==============================================
// 五、修复后的雷达图（标签完整显示）
// ==============================================
function drawRadar() {
    const ctx = document.getElementById("radarCanvas").getContext("2d");
    const cx = 250, cy = 250, r = 150; // 画布扩大到500x500，中心移到(250,250)
    const data = [score.physical, score.cognitive, score.behavioral, score.emotional];
    const max = 50;
    const angle = [-Math.PI/2, 0, Math.PI/2, Math.PI];
    const labels = ["生理焦虑","认知焦虑","行为焦虑","情绪焦虑"];

    ctx.clearRect(0,0,500,500);

    // 网格
    for (let i=1;i<=4;i++) {
        ctx.beginPath();
        angle.forEach((a,j) => {
            const x = cx + (i/4)*r*Math.cos(a);
            const y = cy + (i/4)*r*Math.sin(a);
            j===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        });
        ctx.closePath();
        ctx.strokeStyle = "#eee";
        ctx.stroke();
    }

    // 轴线
    angle.forEach(a => {
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.lineTo(cx + r*Math.cos(a), cy + r*Math.sin(a));
        ctx.strokeStyle = "#eee";
        ctx.stroke();
    });

    // 数据多边形
    ctx.beginPath();
    data.forEach((v,i) => {
        const nr = (v/max)*r;
        const x = cx + nr*Math.cos(angle[i]);
        const y = cy + nr*Math.sin(angle[i]);
        i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle = "rgba(157,78,221,0.2)";
    ctx.fill();
    ctx.strokeStyle = "#9d4edd";
    ctx.stroke();

    // 点
    data.forEach((v,i) => {
        const nr = (v/max)*r;
        const x = cx + nr*Math.cos(angle[i]);
        const y = cy + nr*Math.sin(angle[i]);
        ctx.beginPath();
        ctx.arc(x,y,8,0,Math.PI*2);
        ctx.fillStyle = "#9d4edd";
        ctx.fill();
    });

    // 标签（现在位置在画布内，不会被截断）
    ctx.font = "16px sans-serif";
    ctx.fillStyle = "#9d4edd";
    ctx.textAlign = "center";
    const labelData = [
        {x: cx, y: cy - r - 20, text: `${labels[0]}(${data[0]}分)`},
        {x: cx + r + 20, y: cy, text: `${labels[1]}(${data[1]}分)`},
        {x: cx, y: cy + r + 25, text: `${labels[2]}(${data[2]}分)`},
        {x: cx - r - 20, y: cy, text: `${labels[3]}(${data[3]}分)`}
    ];
    labelData.forEach(item => {
        ctx.fillText(item.text, item.x, item.y);
    });
}

// ==============================================
// 六、原因 & 建议
// ==============================================
function showCause() {
    const total = score.physical + score.cognitive + score.behavioral + score.emotional;
    const list = document.getElementById("causeList");
    let arr = [];
    if (total > 50) {
        arr.push("近期压力较大，身心负荷偏高，超过了自身调节能力");
        arr.push("休息不足、生活节奏偏快，缺乏足够的放松和恢复时间");
        arr.push("对未来思虑较多，过度关注未发生的事情，导致心理负担加重");
    }
    if (score.physical > 20) arr.push("生理反应明显，可能与睡眠质量差、缺乏规律运动、饮食不规律相关");
    if (score.cognitive > 20) arr.push("容易过度思考、反复纠结、担心负面结果，形成了消极的思维模式");
    if (score.behavioral > 20) arr.push("存在回避、拖延、过度检查等行为表现，这些行为会进一步强化焦虑状态");
    if (score.emotional > 20) arr.push("情绪波动大，安全感不足，难以有效调节自身情绪状态");
    list.innerHTML = arr.map(i=>`<li>${i}</li>`).join('');
}

    else if (total <= 120) {

            "记录情绪日记：每天花10分钟记录自己的情绪变化和触发事件，了解焦虑模式",

            "减少压力源：暂时减少工作或学习任务量，优先处理最重要的事情，学会拒绝不合理要求",
            "家人陪伴支持：与家人沟通自己的状态，获得理解和陪伴，避免孤立自己",
            "参加支持小组：加入焦虑情绪支持团体，与有相似经历的人交流，减少孤独感",
            "规律进行放松活动：如正念减压、艺术疗愈、户外散步等，每天至少1小时",
            "学习情绪调节技巧：如情绪命名、接纳情绪、积极自我对话等实用方法"
        ];
    } 
    else {
        arr = [

}

        a.href = canvas.toDataURL("image/png");

        a.click();
        alert("报告已保存到相册");
    });
}
